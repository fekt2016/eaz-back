version: "3.8"

services:
  backend-prod:
    container_name: saiisai-backend-prod
    build:
      context: .
      dockerfile: Dockerfile
    image: saiisai-backend:prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend-staging:
    container_name: saiisai-backend-staging
    build:
      context: .
      dockerfile: Dockerfile
    image: saiisai-backend:staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4000"
    env_file:
      - .env.staging
    environment:
      NODE_ENV: staging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
